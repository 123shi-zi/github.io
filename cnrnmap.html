    // 地图标记点只包含 isMarker === true 的地点
    const markersData = allPlacesData.filter(p => p.isMarker === true);
    
    let map = null;
    let markers = [];
    let infoWindow = null;

    // 初始化地图
    function initMap() {
        map = new AMap.Map('mapContainer', {
            center: [127.53, 50.245],
            zoom: 12,
            scrollWheel: true,
            zoomEnable: true,
            resizeEnable: true
        });
        infoWindow = new AMap.InfoWindow({
            offset: new AMap.Pixel(0, -30),
            autoMove: true,
            closeWhenClickMap: true
        });

        // 添加标记点（仅isMarker为true的地点）
        markersData.forEach(place => {
            const marker = new AMap.Marker({
                position: [place.lng, place.lat],
                title: place.nameCn,
                label: {
                    content: `<div style="background:#c72a2add; color:white; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:bold;">${place.nameCn}</div>`,
                    offset: new AMap.Pixel(0, 30),
                    direction: 'top'
                },
                extData: place,
                cursor: 'pointer'
            });
            // 左键: 中俄文化·美食双语版
            marker.on('click', (e) => {
                showInfoForMarker(marker, 'culture');
            });
            // 右键: 中俄地理位置+重要之处 双语版
            marker.on('rightclick', (e) => {
                AMap.event.preventDefault(e);
                showInfoForMarker(marker, 'importance');
            });
            marker.setMap(map);
            markers.push(marker);
        });

        // 避免地图空白区域右键菜单
        map.on('rightclick', (e) => {
            e.preventDefault();
            if (infoWindow) infoWindow.close();
        });
        map.setFitView(markers);
        buildQuickList();       // 展示全部地点（含非标记点）
        bindSearchEvents();     // 搜索涵盖全部地点
    }

    // 展示信息窗（完全中俄双语）
    function showInfoForMarker(marker, type) {
        const place = marker.getExtData();
        if (!place) return;
        let contentHtml = '';
        if (type === 'culture') {
            // 左键: 文化美食 中+俄
            contentHtml = `
                <div class="custom-info">
                    <h4>🍜 ${place.nameCn} | ${place.nameRu}</h4>
                    <p><span style="font-weight:bold;">🇨🇳 中文·文化美食：</span><br>${place.cultureFoodCn}</p>
                    <p><span style="font-weight:bold;" class="ru-text">🇷🇺 Русский·Культура и еда：</span><br>${place.cultureFoodRu}</p>
                    <p style="font-size:0.7rem; margin-top:5px;">✨ 左键探索中俄风味</p>
                </div>
            `;
        } else {
            // 右键: 地理位置重要性 + 中俄双语解释
            const lng = place.lng.toFixed(4);
            const lat = place.lat.toFixed(4);
            contentHtml = `
                <div class="custom-info">
                    <h4>📍 ${place.nameCn} | ${place.nameRu}</h4>
                    <p>🗺️ <strong>坐标 / Координаты:</strong> ${lng}°E, ${lat}°N</p>
                    <p><strong>🇨🇳 重要之处：</strong><br>${place.importanceCn}</p>
                    <p><strong class="ru-text">🇷🇺 Важность:</strong><br>${place.importanceRu}</p>
                    <p style="font-size:0.7rem; margin-top:5px;">🖱️ 右键查看地理价值</p>
                </div>
            `;
        }
        infoWindow.setContent(contentHtml);
        infoWindow.open(map, marker.getPosition());
    }

    // 构建左侧推荐列表（展示全部地点，不只是标记点，增强搜索可见性）
    function buildQuickList() {

        container.innerHTML = '';
        // 展示所有地点（包含非标记点，点击后若没有marker则只定位并展示文化卡片，通过模拟展示）
        allPlacesData.forEach(place => {
            const div = document.createElement('div');
            div.className = 'place-badge';
            div.innerHTML = `
                <div>
                    <div class="place-name-cn">${place.nameCn}</div>
                    <div class="place-name-ru">${place.nameRu}</div>
                </div>
                <span style="font-size:12px;">🔍</span>
            `;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                // 尝试找到对应的marker（如果存在标记）
                const targetMarker = markers.find(m => m.getExtData().id === place.id);
                if (targetMarker && map) {
                    map.setCenter([place.lng, place.lat]);
                    map.setZoom(14);
                    showInfoForMarker(targetMarker, 'culture'); // 左键风格展示文化双语
                } else {
                    // 对于没有地图标记的点（如五大连池、风情园）仍然跳转到坐标并弹出自定义模拟信息窗（因为无marker，手动创建临时浮层）
                    if (map) {
                        map.setCenter([place.lng, place.lat]);
                        map.setZoom(12);
                        // 创建临时浮层信息窗，展示中俄双语文化内容（不依赖marker）
                        const tempContent = `
                            <div class="custom-info">
                                <h4>📍 ${place.nameCn} | ${place.nameRu}</h4>
                                <p><strong>🇨🇳 文化美食：</strong><br>${place.cultureFoodCn}</p>
                                <p><strong class="ru-text">🇷🇺 Культура и еда：</strong><br>${place.cultureFoodRu}</p>
                                <p><strong>⭐ 重要之处：</strong><br>${place.importanceCn}</p>
                                <p><strong class="ru-text">⭐ Важность:</strong><br>${place.importanceRu}</p>
                                <p style="margin-top:5px;">✨ 周边探索推荐</p>
                            </div>
                        `;
                        infoWindow.setContent(tempContent);
                        infoWindow.open(map, [place.lng, place.lat]);
                    }
                }
            });
            container.appendChild(div);
        });
    }

    // 搜索功能 —— 覆盖所有地点（全量搜索，不只是标记点）
    function performGlobalSearch(keyword) {
        if (!keyword.trim()) {
            document.getElementById('searchResults').innerHTML = '';
            return;
        }
        const lowerKw = keyword.trim().toLowerCase();
        // 匹配所有地点的 中文名、俄文名、文化美食中俄、重要性中俄 所有字段
        const matched = allPlacesData.filter(place => {
            return place.nameCn.toLowerCase().includes(lowerKw) ||
                   place.nameRu.toLowerCase().includes(lowerKw) ||
                   place.cultureFoodCn.toLowerCase().includes(lowerKw) ||
                   place.cultureFoodRu.toLowerCase().includes(lowerKw) ||
                   place.importanceCn.toLowerCase().includes(lowerKw) ||
                   place.importanceRu.toLowerCase().includes(lowerKw);
        });
        const resultsContainer = document.getElementById('searchResults');
        if (matched.length === 0) {
            resultsContainer.innerHTML = '<div style="padding:12px;text-align:center;color:#aaa;">✨ 未找到匹配地点，试试“口岸”“广场”“火山”等</div>';
            return;
        }
        let html = '';
        matched.forEach(place => {
            // 展示预览内容
            let preview = place.cultureFoodCn.substring(0, 45) + '...';
            html += `
                <div class="result-item" data-id="${place.id}">
                    <div class="result-name">🇨🇳 ${place.nameCn} | ${place.nameRu}</div>
                    <div class="result-desc">${preview}</div>
                </div>
            `;
        });
        resultsContainer.innerHTML = html;
        // 绑定点击事件
        document.querySelectorAll('.result-item').forEach(item => {
            item.addEventListener('click', () => {
                const id = parseInt(item.getAttribute('data-id'));
                const selected = allPlacesData.find(p => p.id === id);
                if (selected && map) {
                    map.setCenter([selected.lng, selected.lat]);
                    map.setZoom(13);
                    // 尝试查找是否有对应marker
                    const targetMarker = markers.find(m => m.getExtData().id === selected.id);
                    if (targetMarker) {
                        showInfoForMarker(targetMarker, 'culture');
                    } else {
                        // 非标记点：显示完整双语摘要（文化+重要之处）
                        const contentFull = `
                            <div class="custom-info">
                                <h4>🔍 ${selected.nameCn} | ${selected.nameRu}</h4>
                                <p><strong>🇨🇳 文化美食：</strong><br>${selected.cultureFoodCn}</p>
                                <p><strong class="ru-text">🇷🇺 Кухня и культура:</strong><br>${selected.cultureFoodRu}</p>
                                <p><strong>⭐ 重要之处：</strong><br>${selected.importanceCn}</p>
                                <p><strong class="ru-text">⭐ Значение:</strong><br>${selected.importanceRu}</p>
                            </div>
                        `;
                        infoWindow.setContent(contentFull);
                        infoWindow.open(map, [selected.lng, selected.lat]);
                    }
                    // 清空搜索框显示选中地点
                    document.getElementById('searchInput').value = selected.nameCn;
                    resultsContainer.innerHTML = '';
                }
            });
        });
    }

    // 绑定搜索input事件和主题切换
    function bindSearchEvents() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => performGlobalSearch(e.target.value));
        }
        // 主题切换
        document.getElementById('lightThemeBtn').addEventListener('click', () => switchTheme('light'));
        document.getElementById('darkThemeBtn').addEventListener('click', () => switchTheme('dark'));
    }

    function switchTheme(theme) {
        const body = document.body;
        const lightBtn = document.getElementById('lightThemeBtn');
        const darkBtn = document.getElementById('darkThemeBtn');
        if (theme === 'dark') {
            body.classList.add('dark');
            lightBtn.classList.remove('active');
            darkBtn.classList.add('active');
            if (map) map.setMapStyle('amap://styles/dark');
        } else {
            body.classList.remove('dark');
            lightBtn.classList.add('active');
            darkBtn.classList.remove('active');
            if (map) map.setMapStyle('amap://styles/normal');
        }
    }

    // 启动地图
    window.onload = () => {
        if (typeof AMap !== 'undefined' && AMap.Map) {
            initMap();
        } else {
            console.warn("高德地图加载延迟或Key无效");
            document.getElementById('mapContainer').innerHTML = '<div style="padding:40px;text-align:center;background:#fff3e0;height:100%;">⚠️ 地图加载失败，请检查高德Key配置及网络。<br>您需要注册高德开发者并替换代码顶部Key和安全密钥。</div>';
        }
    };
    // 全局禁止右键默认菜单（地图区域已处理）
    document.addEventListener('contextmenu', function(e) {
        if (e.target.closest('.map-container') || e.target.closest('.amap-marker') || e.target.closest('.amap-icon')) {
            e.preventDefault();
        }
    });
</script>
</body>
